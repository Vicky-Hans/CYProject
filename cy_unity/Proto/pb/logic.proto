  repeated Resource cost = 3;        //消耗
}

// 41-缤果活动

// grp 41 cmd 1 缤果币购买
message ReqBingoCoinBuy {
  int32 count = 1;                  //购买数量
}

message RspBingoCoinBuy {
  int32 status = 1;
  repeated Resource reward = 2;      //奖励
  repeated Resource cost = 3;        //消耗
}

// grp 41 cmd 2 缤果翻牌
message ReqBingoOpen {
  int32 pos = 1;                  //位置（行*100+列，行列都是从1开始）
}

message RspBingoOpen {
  int32 status = 1;
  int32 bingoCount = 2;               //连线次数更新；
  map<int32,Resource> openRecord = 3; //这一次翻出来的两个奖励；界面展示
  repeated Resource cost = 4;         //消耗
  repeated Resource reward = 5;       //奖励；实际奖励
}

// grp 41 cmd 3 缤果进度奖励领取
message ReqBingoClaim {
}

message RspBingoClaim {
  int32 status = 1;
  repeated Resource reward = 2;             //奖励
  repeated int32 id = 3;                    //领取完的id；直接更新
}

// grp 41 cmd 4 缤果reset
message ReqBingoReset {
}

message RspBingoReset {
  int32 status = 1;
  repeated Resource reward = 2;             //奖励；可能得到的奖励
  BingoGrid grid = 3;                       //重置后的缤果活动棋盘信息
}

// grp 41 cmd 5 缤果任务领取
message ReqBingoTaskClaim {
  int32 id = 1;                   //任务id
}

message RspBingoTaskClaim {
  int32 status = 1;
  repeated Resource rewards = 2;  //奖励；
}

// grp 41 cmd 6 缤果兑换
message ReqBingoExchange {
  int32 id = 1;                             //id
  int32 optionalIndex = 2;                  //自选index
}

message RspBingoExchange {
  int32 status = 1;
  repeated Resource rewards = 2;     //奖励；
  repeated Resource cost = 3;        //消耗
}