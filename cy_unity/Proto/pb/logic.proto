syntax = "proto3";
package DH.Proto;
option go_package = "./pb";

import "comm.proto";

// grp 10 cmd 1 角色资产同步
message ReqSync{
}

message RspSync{
  int32 status = 1;
  int64 serverTime = 2;             //服务器时间
  ItemBag  itemBag = 3;             //道具
  CharacterSync character = 4;      //主角
  Lives lives = 5;                  //体力
  MailData mails = 6;               //邮件数据
  MainStage mainStage = 7;          //主线
  EquipBag equip = 8;               //装备
  MonthCard monthCard = 9;          //月卡
  Shop shop = 10;                   //商城功能
  FirstCharge firstCharge = 11;     //首充礼包
  Hero hero = 12;                   //英雄
  Endless endless = 13;             //无尽冒险
  AllPassport passport = 14;        //通行证
  DailyPack dailyPack = 15;         //每日礼包
  LuckyDrawSync luckyDraw = 16;     //幸运转盘
  TriggerGift triggerGift = 17;     //触发礼包
  DailyFight dailyFight = 19;       //每日挑战
  MagicDrawSync magicDraw = 20;     //魔法祈福
  Secret Secret = 21;               //秘林探险
  HeroEquipBag heroEquip = 22;      //英雄装备
  ChapterFund chapterFund = 23;     //章节基金
  SchoolSync school = 24;           //魔法学院
  LuckyTripSync luckyTrip = 25;     //幸运之旅
  MagicAgeSync magicAge = 26;       //魔法时代
  GiftPack giftPack = 27;           //小礼包相关
  LuckyEggSync luckyEgg = 28;       //幸运扭蛋
  AutumnSpecialSync autumn = 29;    //金秋特惠
  BingoSync bingo = 30;             //bingo活动
}

// grp 10 cmd 2 客户端上报fb信息
message ReqFbReport{
  string id = 1;               //fb_id
  string token = 2;            //fb_token
  string headUrl = 3;          //fb头像url
  string name = 4;             //fb名字
}

message RspFbReport{
  int32 status = 1;
}

// grp 10 cmd 3 通用弹窗消息
message ReqNotifyMsg{
}

message RspNotifyMsg{
  int32 status = 1;
  string msgKey = 2;
}

// grp 10 cmd 4 数据推送
message ReqNotify {
}

message RspNotify {
  repeated string dirty = 1;       //脏数据key
  MainStage mainStage = 2;         //主线数据；mainStage
  Shop shop = 3;                   //商城功能；shop
  Hero hero = 4;                   //英雄功能：hero
  Endless endless = 5;             //无尽冒险；endless
  AllPassport passport = 6;         //通行证；passport， 通知的时候map有才有变化k-通行证类型；有那个key，哪个key就有变化，不是所有的；
  DailyPack dailyPack = 7;         //每日礼包；dailyPack
  LuckyDrawSync luckDraw = 8;      //幸运转盘：luckDraw
  TriggerGift triggerGift = 9;     //触发礼包: triggerGift
  DailyFight dailyFight = 10;      //每日挑战：dailyFight
  MagicDrawSync magicDraw = 11;    //魔法祈福：magicDraw
  Secret secret = 12;              //秘林探险:secret
  SchoolSync school = 13;          //魔法学院，school
  LuckyTripSync luckyTrip = 14;    //幸运之旅，luckyTrip
  LuckyEggSync luckyEgg = 15;      //幸运扭蛋，luckyEgg
  BingoSync bingo = 16;            //bingo活动，bingo
}

// grp 10 cmd 5 广告上报：所有广告按钮都上班
message ReqAdUpload {
  int32 count = 1;        //观看的广告次数
  bool look = 2;          //是否实际观看；
}

message RspAdUpload {
  int32 status = 1;
}

// grp 99 cmd 1 gm指令
message ReqGm{
  string cmd = 1;
}

message RspGm{
  int32 status = 1;       //错误码
  string retInfo = 2;     //返回信息：指令执行反馈文本信息；
}

// grp 99 cmd 2 gm指令数据同步
message ReqGmSync{
}

message RspGmSync{
  RspSync syncInfo = 1;     //GM同步信息
}

// grp 99 cmd 3 cy战斗gm指令
message ReqBattleGm{
  int32 cmd = 1; //1-刷新天赋，2-刷新装备
  repeated int32 ids = 2;        //输入id
}

message RspBattleGm{
  int32 status = 1;              //错误码
  repeated int32 ids = 2;        //返回信息
}
//==================== 支付 ====================//
// grp 200 cmd 1 预支付
message ReqPrePay {
  int32 packageId = 1;                    // package表id
  appInfo app = 2;                        // 前端上传的信息
  int32 index = 3;                        // 自选index,默认传-1，有自选传自选奖励index
}

message RspPrePay {
  int32 status = 1;                       // 0成功1不满足支付条件 其他的错误码见upay文档 2 英雄背包已满 3 订阅信息更新请重新登陆
  string orderId = 2;                    // 订单号
}

// grp 200 cmd 2 支付领奖
message ReqRewardPay {
  string orderId = 1;                        // prepay返回的订单号
  string storeId = 2;                        // 商品id  <<"com.droidhang.test.diamond11">>
  appInfo app = 3;                           // 前端上传的信息
  currencyInfo currencyInfo = 4;             // 货币信息
}

message RspRewardPay {
  int32 status = 1;                       // 0成功1验证失败
  repeated Resource rewards = 2;                  // 奖励
  int32 cd = 3;                          // 订阅到期cd
}

// grp 200 cmd 3 补单
message ReqLoginRewardPay {
  string orderId = 1;                        // prepay返回的订单号
  string storeId = 2;                        // 商品id  <<"com.droidhang.test.diamond11">>
  appInfo app = 3;                           // 前端上传的信息
  currencyInfo currencyInfo = 4;             //货币信息
}

message RspLoginRewardPay {
  int32 status = 1;                          // 0成功
  string storeId = 2;                        // 商品id  <<"com.droidhang.test.diamond11">>
}

//11 体力相关

// grp 11 cmd 1 体力：获得体力
message ReqLivesGet{
  int32 op = 1;   //获得操作：1-广告，2-钻石购买，3-购买砖石存储
}

message RspLivesGet{
  int32 status = 1;
  repeated Resource cost = 2; //消耗
}

// grp 11 cmd 2 体力：体力值同步
message ReqLivesSync{
}

message RspLivesSync{
  int32 status = 1;
  int32 curr = 2;
  int64 refreshStamp = 3;           //体力倒计时开始的时间戳
}

//12 邮件
// grp 12 cmd 1 阅读邮件
message ReqMailRead {
  int32 mailId = 1;
}

message RspMailRead {
  int32 status = 1;
}

// grp 12 cmd 2 邮件领奖
message ReqMailReward {
  repeated int32 mailIds = 1;
}

message RspMailReward {
  int32 status = 1;
  repeated Resource reward = 2;
  repeated int32 mailIds = 3;       //成功领奖的mailId
}

// grp 12 cmd 3 邮件删除
message ReqMailDelete {
  repeated int32 mailIds = 1;
}

message RspMailDelete {
  int32 status = 1;
}

// grp 12 cmd 4 邮件同步
message ReqMailSync {
}

message RspMailSync {
  int32 status = 1;
  MailData mails = 2;               //邮件数据
}

//13 装备

// grp 13 cmd 1 装备穿戴
message ReqEquipWearOp {
  int32 id = 1;         //装备id
  int32 op = 2;         //1-穿戴，2-移除，3-替换
  int32 oldId = 3;      //被替换的id；替换操作使用参数
}

message RspEquipWearOp {
  int32 status = 1;
  EquipWearFormation data = 2;      //操作后的该装备穿戴方案的数据
}

// grp 13 cmd 2 装备升级
message ReqEquipLevelUp {
  int32 id = 1;         //装备id
}

message RspEquipLevelUp {
  int32 status = 1;
  Equip data = 2;             //操作后的该装备数据
  repeated Resource cost = 3; //消耗
}

// grp 13 cmd 3 切换方案
message ReqEquipSwitch {
  int32 id = 1;         //方案id，1-3
}

message RspEquipSwitch {
  int32 status = 1;
}

//14 主线

// grp 14 cmd 1 主线副本战斗开始
message ReqMainFightBegin {
  int32 chapterId = 1;
}

message RspMainFightBegin {
  int32 status = 1;
  FightData data = 2;                  //主线战斗数据；预留，只包含一些基本信息不包括具体计算属性值；目前包含，随机种子+战斗唯一id
  repeated Resource cost = 3; //消耗
}

// grp 14 cmd 2 主线副本战斗结束
message ReqMainFightEnd {
  int32 chapterId = 1;
  int64 uid = 2;                          //战斗uid
  FightStat stat = 3;                     //战斗结束统计数据，没有的数据就不发和挑战使用一个；
  bool archive = 4;                       //是否存档直接结算
  map<int32,int32> equipSlots = 5;        //装备格子里的装备; k-格子位置（行*100+列）v-格子状态或数据（0-未解锁，1-已解锁，装备id-对应装备）；行和列都从1开始；
  bool finish = 6;                        //是否是正常结束 true-正常结束 false-主动退出
}

message RspMainFightEnd {
  int32 status = 1;
  repeated Resource rewards = 2;  //对应奖励；
  int32 star = 3;                 //更新当前关卡的star
}

// grp 14 cmd 3 主线副本广告双倍奖励
message ReqMainFightAdDouble {
  int32 chapterId = 1;
  int64 uid = 2;                          //战斗uid
  FightStat stat = 3;                     //将统计数据再发送一遍，以便直接再次计算奖励；
}

message RspMainFightAdDouble {
  int32 status = 1;
  repeated Resource rewards = 2;  //对应奖励；
}

// grp 14 cmd 4 主线副本领取章节宝箱
message ReqMainFightBox {
  int32 chapterId = 1;      //章节id
  int32 boxIndex = 2;       //宝箱下标
}

message RspMainFightBox {
  int32 status = 1;
  repeated Resource rewards = 2;  //对应奖励；
}

// grp 14 cmd 6 主线副本战斗读取存档开始
message ReqMainFightArchiveBegin {
}

message RspMainFightArchiveBegin {
  int32 status = 1;
  int32 stageId = 2;                     //存档的关卡
  FightData data = 3;                  //主线战斗数据；预留，只包含一些基本信息不包括具体计算属性值；目前包含，随机种子+战斗唯一id
}

// grp 14 cmd 8 主线副本巡逻奖励领取
message ReqMainHangupClaim {
  int32 op = 1;       //领取操作：1-正常时间结算 2-免费快速巡逻，3-广告快速巡逻
}

message RspMainHangupClaim {
  int32 status = 1;
  repeated Resource reward = 2;  //对应奖励；
  repeated Resource cost = 3;  //对应消耗；
}

//15 战斗交互

// grp 15 cmd 1 战斗装备刷新
message ReqBattleEquipRefresh {
  int64 uid = 1;                       //战斗唯一id
  int32 op = 2;                        //1-波次免费刷新，2-广告免费刷新，3-金币刷新；
  repeated int32 equipMergeCount = 3;  //装备合成次数数据；依次是物理，魔法
  map<int32,int32> equipSlots = 4;     //【战斗中的刷新不需要使用这个存盘】装备格子里的装备; k-格子位置（行*100+列）v-格子状态或数据（0-未解锁，1-已解锁，装备id-对应装备）；行和列都从1开始；
}

message RspBattleEquipRefresh {
  int32 status = 1;
  repeated int32 equips = 2;             //刷新出来的装备；
  int32 costMoney = 3;                   //花费的钱；
}

// grp 15 cmd 2 战斗天赋刷新
message ReqBattleTalentRefresh {
  int64 uid = 1;                       //战斗唯一id
  int32 op = 2;                        //1-升级免费刷新，2-广告免费刷新
  int32 param = 3;                     //参数：等级；由于可以存储这个刷新，这个参数传递的是需要刷新哪个等级的天赋不是当前等级；广告的时候传当前已经刷新到哪个等级了；
}

message RspBattleTalentRefresh {
  int32 status = 1;
  repeated int32 talents = 2;         //刷新出来的天赋；
}

// grp 15 cmd 3 战斗天赋选择
message ReqBattleTalentSelect {
  int64 uid = 1;                       //战斗唯一id
  int32 index = 2;                     //选择技能的角标；从0开始
}

message RspBattleTalentSelect {
  int32 status = 1;
  repeated int32 talent = 2;                   //选择成功的技能；可能是多个，存在技能一次性获得全部
  int32 gotMoney = 3;                          //变化的钱；
  int32 equipRefreshMoney = 4;                 //更新装备刷新需要花的钱；
}

// grp 15 cmd 4 战斗升级
message ReqBattleLvUp {
  int64 uid = 1;                       //战斗唯一id
  int32 lv = 2;                        //等级
  int32 exp = 3;                       //经验
}

message RspBattleLvUp {
  int32 status = 1;
}

// grp 15 cmd 5 波次结束
message ReqBattleWaveDone {
  int64 uid = 1;                        //战斗唯一id
  int32 lv = 2;                         //等级
  int32 exp = 3;                        //经验
  repeated int32 equips = 4;            //刷新出来但未操作的装备；战斗开始就有；id*10+广告状态(0-未看，1-已看)
  map<int32,int32> equipSlots = 5;      //装备格子里的装备; k-格子位置（行*100+列）v-格子状态或数据（0-未解锁，1-已解锁，装备id-对应装备）；
  map<string,int32> attr = 6;             //需要保存的属性，k-属性key，v-值；
  map<int64,int64> hurtStat = 7;          //伤害统计
  int32 energy = 8;                       //主动技能能量值
  repeated int32 wish = 9;                //心愿存储槽位
  int32 kills = 10;                      //杀敌数
  int32 wave = 11;                      //结束的波次；第一波结束传1；
  repeated int32 equipMergeCount = 12;  //装备合成次数数据；依次是物理，魔法
}

message RspBattleWaveDone {
  int32 status = 1;
  int32 money = 2;                  //更新钱
  int32 equipWaveRefresh = 3;       //默认的装备刷新剩余次数；每波都有；
  int32 equipWaveAdRefresh = 4;     //默认的装备广告刷新剩余次数；每波都有；
  repeated int32 moneyShow = 5;     //用于做表现，实际最后得钱以上面的数值为准；固定三个值；利息，波次奖励，钱袋子收益
}

// grp 15 cmd 6 装备多属性技能选择
message ReqBattleEquipSkillSelect {
  int64 uid = 1;                        //战斗唯一id
  int32 equipId = 2;                    //装备id
  int32 skillId = 3;                    //选择的equip model id
}

message RspBattleEquipSkillSelect {
  int32 status = 1;
}

// grp 15 cmd 7 无尽战斗装备刷新
message ReqBattleEndlessEquip {
  int64 uid = 1;                       //战斗唯一id
  int32 op = 2;                        //1-波次免费刷新，2-广告免费刷新，3-金币刷新；
  bool battleBegin = 3;                //战斗是否开始；用于判断存盘；
  map<int32,int32> equipSlots = 4;     //【战斗中的刷新不需要使用这个存盘】装备格子里的装备; k-格子位置（行*100+列）v-格子状态或数据（0-未解锁，1-已解锁，装备id-对应装备）；行和列都从1开始；（
  repeated int32 equipMergeCount = 5;  //装备合成次数数据；依次是物理，魔法
}

message RspBattleEndlessEquip {
  int32 status = 1;
  repeated int32 equips = 2;             //刷新出来的装备；
  int32 costMoney = 3;                   //花费的钱；
  repeated int32 holy = 4;              //刷新出来的圣物；不一定有
}

// grp 15 cmd 8 无尽战斗波次结束存盘信息上传；
message ReqBattleEndlessWaveDone {
  int64 uid = 1;                        //战斗唯一id
  map<int64,int64> hurtStat = 2;        //伤害统计
  repeated int32 equips = 3;            //刷新出来但未操作的装备；战斗开始就有；id*10+广告状态(0-未看，1-已看)
  map<int32,int32> equipSlots = 4;      //装备格子里的装备; k-格子位置（行*100+列）v-格子状态或数据（0-未解锁，1-已解锁，装备id-对应装备）；
  map<string,int32> attr = 5;           //需要保存的属性，k-属性key，v-值；
  int32 kills = 6;                      //击杀
  int32 survivalTime = 7;               //生存时间；秒
  int32 energy = 8;                     //能量
  repeated int32 wish = 9;              //心愿存储槽位
  repeated int32 equipMergeCount = 10;  //装备合成次数数据；依次是物理，魔法
}

message RspBattleEndlessWaveDone {
  int32 status = 1;
}

// grp 15 cmd 9 战斗复活
message ReqFightRevive {
  int32 op = 1;                        //1-主线钻石复活，2-服饰技能复活 3-每日挑战钻石复活
}

message RspFightRevive {
  int32 status = 1;
  FightData data = 2;                  //战斗数据；用上一波的数据恢复战斗；
  repeated Resource cost = 3;          //复活消耗；
}

//16 主角相关

// grp 16 cmd 1 改名
message ReqChangeName{
  string name = 1;   //获得操作：1-广告，2-钻石购买
}

message RspChangeName{
  int32 status = 1;
  repeated Resource cost = 2; //道具消耗
}

// grp 16 cmd 2 排行榜通用协议
message ReqRankOp {
  int32 op = 1;         //排行榜类型；1-主线，2-无尽冒险，3-学院活动 4-秘林
  int32 param = 2;      //主线参数说明：1-全球；2-地区
}

message RspRankOp {
  int32 status = 1;
  repeated RankMember top = 2;   //排行榜上信息
  int32 score = 3;               //玩家自己的分数
  int64 rank = 4;                //玩家自己的排名，<=0都表示未上榜，>0表示排名
