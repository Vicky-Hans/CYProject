}

message RspInviteClaim{
  int32 status = 1;            //状态码；
  repeated Resource reward = 2;  //奖励
}

// 17 月卡

// grp 17 cmd 1 月卡每日奖励领取
message ReqMonthCardClaim {
  int32 op = 1;         //操作 1-普通月卡，2-高级月卡
}

message RspMonthCardClaim {
  int32 status = 1;
  repeated Resource reward = 2;   //奖励，可能会领取多日的奖励
}

// grp 17 cmd 2 双月卡奖励领取
message ReqMonthCardDoubleClaim {
}

message RspMonthCardDoubleClaim {
  int32 status = 1;
  repeated Resource reward = 2;   //奖励
}

// 商城 18

// grp 18 cmd 1 每日商城购买
message ReqShopDailyBuy {
  int32 dailyId = 1;          //dailyShop配置表id
  int32 count = 2;            //购买数量
}

message RspShopDailyBuy {
  int32 status = 1;
  repeated Resource rewards = 2;    //奖励
  repeated Resource cost = 3;       //消耗
}

// grp 18 cmd 2 招募宝箱购买
message ReqShopRecruitBuy {
  int32 equipChestId = 1; //equipChest表的id，对应不同的宝箱
  int32 op = 2;           //1-广告免费，2-砖石，3-道具
}

message RspShopRecruitBuy {
  int32 status = 1;
  repeated Resource rewards = 2;    //宝箱开出的奖励
