// grp 16 cmd 6 discord社区兑换成功推送
message ReqDiscordSync{
}

message RspDiscordSync{
  int32 status = 1;
  int32 discordFlag = 2;      //对应discord flag
}

// grp 16 cmd 7 使用免广告券
message ReqItemUseFreeAd{
}

message RspItemUseFreeAd{
  int32 status = 1;
  repeated Resource cost = 2;
}

// grp 16 cmd 8 玩家点击邀请链接上报后端
message ReqInviteReport{
  int64 roleId = 1;          //链接里的要求者id
}

message RspInviteReport{
  int32 status = 1;      //状态码；
  bool success = 2;      //是否成功被邀请，true-成功（修改数据里的标记），false-失败；
}

// grp 16 cmd 9 邀请成功后进度同步
message ReqInviteSync{
}

message RspInviteSync{
  int32 status = 1;            //状态码；
  int32 inviteNumber = 2;      //成功邀请的次数；
}

// grp 16 cmd 10 领取要求进度奖励
message ReqInviteClaim{
