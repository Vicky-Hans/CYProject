// grp 16 cmd 3 玩家排行榜概要信息
message ReqRankDigest{
  int64 roleId = 1;
}

message RspRankDigest{
  int32 status = 1;
  RankDigestInfo data = 2;    //概要信息
}

// grp 16 cmd 4 头像/头像框相关操作
message ReqHeadOp{
  int32 op = 1;   //1-更改头像，2-更改头像框，3-点击头像/头像框【新】
  int32 id = 2;   //对应id
}

message RspHeadOp{
  int32 status = 1;
}

// grp 16 cmd 5 兑换码兑换
message ReqRedeemExchange{
  string code = 1;        //兑换码
}

message RspRedeemExchange{
  int32 status = 1;
  repeated Resource rewards = 2;
